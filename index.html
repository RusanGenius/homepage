<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <!-- Preconnect for search engines -->
    <link rel="preconnect" href="https://www.google.com">
    <link rel="dns-prefetch" href="https://www.google.com">
    <link rel="preconnect" href="https://yandex.ru">
    <link rel="dns-prefetch" href="https://yandex.ru">
    <link rel="preconnect" href="https://duckduckgo.com">
    <link rel="dns-prefetch" href="https://duckduckgo.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
:root{--widget-gap-x:0.5rem;--widget-gap-y:0.5rem;--widget-search-gap:2.5rem;--widget-size:64px;--widget-icon-color:#c0c0c0}@media(min-width:768px){:root{--widget-gap-x:0.75rem;--widget-gap-y:0.75rem;--widget-search-gap:2.5rem;--widget-size:64px}}.widget-item{transition:transform .2s ease,opacity .2s ease}.widget-icon-color{color:var(--widget-icon-color)}.widget-icon-color:hover{color:#fff}.no-select{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}.folder-select-widget{transition:all .2s ease}.folder-select-widget.selected{background-color:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3)!important}.folder-select-widget.selected .icon-container{background-color:rgba(255,255,255,.15);color:#fff}.glass{background:rgba(20,20,20,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.glass-light{background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.glass-input{background:rgba(20,20,20,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}body.theme-black{background-color:#121212!important}body.theme-black .glass{background:rgba(30,30,30,.7)!important}body.theme-black .glass-input{background:rgba(30,30,30,.5)!important}.icon-shape-round .widget-icon-container,.icon-shape-round .icon-container,.icon-shape-round #add-widget-btn-main>div,.icon-shape-round .folder-preview-icon,.icon-shape-round #group-view-widgets-grid>a>div,.icon-shape-round .group-widget-icon{border-radius:50%!important}body.folder-style-icon .folder-preview{display:none!important}body.folder-style-icon .folder-icon{display:inline-block!important}.folder-icon{display:none}.add-btn-hidden #add-widget-btn-main{display:none!important}.folder-preview-no-bg .folder-preview-icon{background:transparent!important}.folder-preview-icon{background:transparent!important}.group-widget-icon{border-radius:12px}.group-title-input{border-bottom:1px solid transparent;background:transparent}.group-title-input:focus{border-bottom-color:rgba(255,255,255,.3);background:transparent}#settings-modal-content::-webkit-scrollbar{width:6px}#settings-modal-content::-webkit-scrollbar-track{background:transparent}#settings-modal-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}#icon-grid-container::-webkit-scrollbar{width:6px}#icon-grid-container::-webkit-scrollbar-track{background:transparent}#icon-grid-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}#icon-grid-container::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}#engine-menu .engine-option{border-radius:8px;margin:2px 6px;padding-left:12px;padding-right:36px;position:relative}#engine-menu .engine-option.selected{color:#fff}.yandex-icon-wrapper{overflow:hidden}.yandex-icon{transform:scaleY(1.15)}#engine-menu .engine-option[data-engine="google"] .engine-icon-inner,#engine-menu .engine-option[data-engine="duckduckgo"] .engine-icon-inner,#engine-menu .engine-option[data-engine="yandex"] .engine-icon-inner{filter:grayscale(1) brightness(.7)}#engine-menu .engine-option>span{font-weight:300}#engine-btn svg{width:1.15rem!important;height:1.15rem!important}#engine-btn[data-engine="google"],#engine-btn[data-engine="duckduckgo"],#engine-btn[data-engine="yandex"]{filter:grayscale(1) brightness(.7)!important}#engine-btn{display:flex;align-items:center;justify-content:center}.setting-btn{background:rgba(255,255,255,.05);border:1.5px solid transparent;color:#a3a3a3}.setting-btn.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);color:#fff}input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:none}input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;cursor:pointer}input[type="range"]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;cursor:pointer;border:none}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes fadeOut{from{opacity:1}to{opacity:0}}.modal-enter{animation:fadeIn .2s ease forwards}.modal-exit{animation:fadeOut .2s ease forwards}
    </style>
</head>
<body class="min-h-screen bg-black text-white font-sans selection:bg-neutral-800 no-select">
    <main class="container mx-auto px-4 pt-32 pb-16 flex flex-col items-center">

        <!-- Search Bar -->
        <form id="search-form" class="w-full max-w-2xl relative flex items-center mb-[--widget-search-gap]">
            <div class="relative" id="engine-menu-container">
                <button type="button" id="engine-btn" class="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-400 text-white transition-colors flex items-center justify-center w-8 h-8 rounded-full grayscale z-10">
                    <!-- Icon injected by JS -->
                </button>

                <div id="engine-menu" class="hidden absolute top-full left-0 mt-4 w-48 glass border border-white/10 rounded-2xl shadow-2xl overflow-hidden z-50 py-2 opacity-0 transition-opacity duration-200">
                    <!-- Options injected by JS -->
                </div>
            </div>

            <input type="text" id="search-input" autocomplete="off" placeholder="Search the web..." class="w-full glass-input border border-white/10 focus:border-white/30 rounded-full pl-16 pr-6 py-3 text-lg text-white placeholder-neutral-600 outline-none transition-all shadow-sm focus:shadow-md" autofocus>
        </form>

        <!-- Widgets Grid -->
        <div class="w-full max-w-6xl">
            <div id="widgets-grid" class="flex flex-wrap justify-center" style="column-gap: var(--widget-gap-x); row-gap: var(--widget-gap-y);">
                <!-- Widgets injected by JS -->
            </div>
        </div>
    </main>

    <!-- Context Menu -->
    <div id="context-menu" class="hidden absolute glass border border-white/10 rounded-xl shadow-2xl z-[100] py-1 w-48 overflow-hidden">
        <button id="cm-left" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed"><i data-lucide="arrow-left" class="w-4 h-4"></i> Move Left</button>
        <button id="cm-right" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed"><i data-lucide="arrow-right" class="w-4 h-4"></i> Move Right</button>
        <button id="cm-edit" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="edit-2" class="w-4 h-4"></i> Edit</button>
        <button id="cm-move-group" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="folder-input" class="w-4 h-4"></i> Move to Group</button>
        <button id="cm-remove-from-group" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="arrow-left" class="w-4 h-4"></i> Remove from Folder</button>
        <div class="h-px bg-white/10 my-1"></div>
        <button id="cm-delete" class="w-full text-left px-4 py-2 text-sm text-red-400 flex items-center gap-3"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete</button>
    </div>

    <!-- Group Widget Context Menu -->
    <div id="group-widget-context-menu" class="hidden absolute glass border border-white/10 rounded-xl shadow-2xl z-[100] py-1 w-48 overflow-hidden">
        <button id="gcm-remove" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="arrow-left" class="w-4 h-4"></i> Remove from Folder</button>
        <button id="gcm-delete" class="w-full text-left px-4 py-2 text-sm text-red-400 flex items-center gap-3"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete</button>
    </div>

    <!-- Empty Space Context Menu -->
    <div id="empty-context-menu" class="hidden absolute glass border border-white/10 rounded-xl shadow-2xl z-[100] py-1 w-48 overflow-hidden">
        <button id="ecm-settings" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="settings" class="w-4 h-4"></i> Settings</button>
        <button id="ecm-add-widget" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="plus" class="w-4 h-4"></i> Add Widget</button>
        <button id="ecm-add-folder" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="folder-plus" class="w-4 h-4"></i> Add Folder</button>
    </div>

    <!-- Add Menu Dropdown -->
    <div id="add-menu" class="hidden absolute glass border border-white/10 rounded-xl shadow-2xl z-[60] py-1 w-40 overflow-hidden">
        <button id="am-widget" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="plus" class="w-4 h-4"></i> Add Widget</button>
        <button id="am-folder" class="w-full text-left px-4 py-2 text-sm text-neutral-300 flex items-center gap-3"><i data-lucide="folder-plus" class="w-4 h-4"></i> Add Folder</button>
    </div>

    <!-- Add/Edit Widget Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="glass border border-white/10 rounded-2xl p-6 w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-200" id="add-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="add-modal-title" class="text-xl font-medium text-white">Add Widget</h2>
                <button id="close-add-modal" class="text-neutral-500 text-white transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-1.5">Title</label>
                    <input type="text" id="add-title" placeholder="e.g. GitHub" class="w-full glass-input border border-white/10 rounded-xl px-4 py-3 text-white focus:border-white/30 outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-1.5">URL</label>
                    <input type="text" id="add-url" placeholder="e.g. github.com" class="w-full glass-input border border-white/10 rounded-xl px-4 py-3 text-white focus:border-white/30 outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Icon</label>
                    <div id="icon-grid-container" class="max-h-48 overflow-y-auto pr-1 mb-2">
                        <div id="icon-grid" class="grid grid-cols-6 gap-2">
                            <!-- Icons injected by JS -->
                        </div>
                    </div>
                    <button type="button" id="toggle-icons-btn" class="w-full py-2 text-xs text-neutral-400 bg-white/5 hover:bg-white/10 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <span id="toggle-icons-text">Show All Icons</span>
                        <i data-lucide="chevron-down" class="w-3 h-3"></i>
                    </button>
                </div>
                <button id="add-widget-btn" disabled class="w-full bg-white/90 text-black font-medium rounded-xl py-3 mt-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    Save Widget
                </button>
            </div>
        </div>
    </div>

    <!-- Create Folder Modal -->
    <div id="create-folder-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="glass border border-white/10 rounded-2xl p-6 w-full max-w-2xl shadow-2xl transform scale-95 transition-transform duration-200" id="create-folder-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-medium text-white">Create Folder</h2>
                <button id="close-folder-modal" class="text-neutral-500 text-white transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-1.5">Folder Name</label>
                    <input type="text" id="folder-title" placeholder="e.g. Work" class="w-full glass-input border border-white/10 rounded-xl px-4 py-3 text-white focus:border-white/30 outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Select Widgets to Include</label>
                    <div id="folder-widgets-grid" class="flex flex-wrap gap-2 max-h-64 overflow-y-auto p-2 rounded-xl border border-white/10" style="background: rgba(0,0,0,0.2);"></div>
                </div>
                <button id="create-folder-btn" disabled class="w-full bg-white/90 text-black font-medium rounded-xl py-3 mt-2 disabled:opacity-50 disabled:cursor-not-allowed">Create Folder</button>
            </div>
        </div>
    </div>

    <!-- Move to Group Modal -->
    <div id="move-group-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="glass border border-white/10 rounded-2xl p-6 w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-200" id="move-group-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-medium text-white">Move to Group</h2>
                <button id="close-move-group-modal" class="text-neutral-500 text-white transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div id="move-group-grid" class="space-y-2 max-h-64 overflow-y-auto"></div>
        </div>
    </div>

    <!-- Group View Modal -->
    <div id="group-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-none z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="glass border border-white/10 rounded-3xl p-5 w-[295px] shadow-2xl transform scale-95 transition-transform duration-200" id="group-modal-content">
            <div class="flex justify-center items-center mb-4">
                <input type="text" id="group-view-title" class="group-title-input bg-transparent text-base font-medium text-white outline-none border-b border-transparent focus:border-white/30 transition-colors px-2 py-1 text-center">
            </div>
            <div id="group-view-widgets-container" class="relative overflow-hidden mb-6" style="margin: 0 auto;">
                <div id="group-view-widgets-grid" class="transition-transform duration-300" style="display: flex; flex-wrap: nowrap; width: max-content; gap: 8px;">
                    <!-- Group children injected by JS -->
                </div>
            </div>
            <div id="group-pagination" class="flex items-center justify-center gap-1.5 pb-0 pt-4">
                <!-- Dots injected by JS -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="glass border border-white/10 rounded-2xl p-6 w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-200 max-h-[85vh] overflow-y-auto" id="settings-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-medium text-white">Settings</h2>
                <button id="close-settings-modal" class="text-neutral-500 text-white transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Theme</label>
                    <div class="flex gap-2">
                        <button id="theme-amoled" class="setting-btn flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-all" data-theme="amoled">
                            <span class="block w-6 h-6 rounded-md bg-black mx-auto mb-1.5 border border-white/20"></span>
                            AMOLED
                        </button>
                        <button id="theme-black" class="setting-btn flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-all" data-theme="black">
                            <span class="block w-6 h-6 rounded-md bg-[#121212] mx-auto mb-1.5 border border-white/20"></span>
                            Black
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Icon Shape</label>
                    <div class="flex gap-2">
                        <button id="icon-square" class="setting-btn flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-all" data-shape="square">
                            <span class="block w-6 h-6 rounded-md bg-white/20 mx-auto mb-1.5"></span>
                            Square
                        </button>
                        <button id="icon-round" class="setting-btn flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-all" data-shape="round">
                            <span class="block w-6 h-6 rounded-full bg-white/20 mx-auto mb-1.5"></span>
                            Round
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Folder Style</label>
                    <div class="flex gap-2">
                        <button id="folder-style-preview" class="setting-btn flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-all" data-folderstyle="preview">
                            <span class="block w-6 h-6 rounded-md bg-white/20 mx-auto mb-1.5 grid grid-cols-2 gap-0.5 p-0.5">
                                <span class="bg-white/30 rounded-sm"></span>
                                <span class="bg-white/30 rounded-sm"></span>
                                <span class="bg-white/30 rounded-sm"></span>
                                <span class="bg-white/30 rounded-sm"></span>
                            </span>
                            Preview
                        </button>
                        <button id="folder-style-icon" class="setting-btn flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-all" data-folderstyle="icon">
                            <span class="block w-6 h-6 rounded-md bg-white/20 mx-auto mb-1.5 flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
                                </svg>
                            </span>
                            Icon
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Add Button</label>
                    <div class="flex gap-2">
                        <button id="add-btn-show" class="setting-btn flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all" data-addbtn="true">Show</button>
                        <button id="add-btn-hide" class="setting-btn flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all" data-addbtn="false">Hide</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Widget Size</label>
                    <input type="range" id="widget-size-slider" min="40" max="80" value="64" class="w-full">
                    <div class="flex justify-between text-xs text-neutral-500 mt-1">
                        <span>Small</span>
                        <span id="widget-size-value">64px</span>
                        <span>Large</span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Widget Spacing</label>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-xs text-neutral-500 mb-1">
                                <span>Horizontal</span>
                                <span id="widget-gap-x-value">8px</span>
                            </div>
                            <input type="range" id="widget-gap-x-slider" min="0" max="40" value="8" class="w-full">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-neutral-500 mb-1">
                                <span>Vertical</span>
                                <span id="widget-gap-y-value">8px</span>
                            </div>
                            <input type="range" id="widget-gap-y-slider" min="0" max="40" value="8" class="w-full">
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Search Spacing</label>
                    <input type="range" id="search-gap-slider" min="0" max="80" value="40" class="w-full">
                    <div class="flex justify-between text-xs text-neutral-500 mt-1">
                        <span>Close</span>
                        <span id="search-gap-value">40px</span>
                        <span>Far</span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-3">Data Management</label>
                    <div class="flex gap-2">
                        <button id="export-btn" class="flex-1 py-2.5 px-4 rounded-lg border border-white/20 bg-white/10 text-neutral-300 font-medium transition-all flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i> Export
                        </button>
                        <button id="import-btn" class="flex-1 py-2.5 px-4 rounded-lg border border-white/20 bg-white/10 text-neutral-300 font-medium transition-all flex items-center justify-center gap-2">
                            <i data-lucide="upload" class="w-4 h-4"></i> Import
                        </button>
                    </div>
                    <input type="file" id="import-file" accept=".json" class="hidden">
                </div>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
